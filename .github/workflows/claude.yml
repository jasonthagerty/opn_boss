name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          additional_permissions: |
            actions: read
          claude_args: >-
            --allowed-tools "
            Bash(ruff:*),
            Bash(ruff check:*),
            Bash(ruff check --fix:*),
            Bash(mypy:*),
            Bash(pytest:*),
            Bash(uv:*),
            Bash(uv run:*),
            Bash(uv pip install:*),
            Bash(uv pip install --system:*),
            Bash(curl -LsSf https://astral.sh/uv/install.sh | sh:*),
            Bash(git add:*),
            Bash(git commit:*),
            Bash(git push:*),
            Bash(git pull:*),
            Bash(git fetch:*),
            Bash(git checkout:*),
            Bash(git branch:*),
            Bash(git status:*),
            Bash(git diff:*),
            Bash(git log:*),
            Bash(git restore:*),
            Bash(gh issue:*),
            Bash(gh pr:*),
            Bash(gh label:*),
            Bash(gh run:*),
            Bash(tree:*),
            Bash(ls:*),
            Bash(cat:*),
            Bash(echo:*),
            Bash(mkdir:*),
            Bash(rm:*),
            Bash(cp:*),
            Bash(mv:*),
            Bash(find:*),
            Bash(grep:*),
            Bash(which:*),
            Bash(command -v:*)
            "
