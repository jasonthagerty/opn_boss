<div id="policy-summary" class="space-y-3">
  <div class="flex items-center justify-between">
    <div class="text-xs text-gray-400">
      Generated {{ summary.generated_at.strftime('%Y-%m-%d %H:%M UTC') }} · Model: {{ summary.model }}
    </div>
    <button
      hx-post="/api/policy/{{ firewall_id }}/analyze"
      hx-target="#policy-summary"
      hx-swap="outerHTML"
      hx-indicator="#policy-spinner"
      class="text-xs text-blue-600 hover:text-blue-800 underline"
    >Regenerate</button>
  </div>
  <div class="prose prose-sm max-w-none text-gray-700 whitespace-pre-wrap bg-gray-50 rounded p-4 text-sm leading-relaxed">{{ summary.summary }}</div>
</div>
