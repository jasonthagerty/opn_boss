{% if online %}
<span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs rounded-full bg-green-100 text-green-800">
  Online
</span>
{% else %}
<span class="inline-flex items-center gap-1 px-2 py-0.5 text-xs rounded-full bg-red-100 text-red-800">
  Offline{% if error %}: {{ error }}{% endif %}
</span>
{% endif %}
